<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROK Starfield 开源片段 · 手感 Demo</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, "PingFang SC", sans-serif; }
  #nebula {
    position: fixed; inset: 0; width: 100%; height: 100%;
    background: url('starry-nebula.png') center/cover no-repeat;
    filter: brightness(1.05) saturate(1.1);
    display: none; /* 默认原版纯黑 */
  }
  #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .panel {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center;
    background: rgba(10,12,24,0.66); backdrop-filter: blur(14px);
    border: 1px solid rgba(160,180,255,0.22); border-radius: 999px;
    padding: 10px 16px; color: #dfe4ff; font-size: 13px; z-index: 10;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .panel button {
    border: 1px solid rgba(160,180,255,0.3); background: rgba(40,50,90,0.5);
    color: #eaf0ff; padding: 7px 14px; border-radius: 999px; cursor: pointer;
    font-size: 13px; transition: all .2s;
  }
  .panel button.active { background: #5b6cff; border-color: #7c8bff; color: #fff; }
  .panel label { opacity: .85; }
  .panel input[type=range] { width: 120px; accent-color: #6b7bff; }
  .tag {
    position: fixed; top: 18px; left: 18px; z-index: 10;
    background: rgba(10,12,24,0.6); border: 1px solid rgba(160,180,255,0.2);
    color: #cfd6ff; font-size: 12px; padding: 8px 12px; border-radius: 10px;
    backdrop-filter: blur(10px); max-width: 330px; line-height: 1.55;
  }
  .tag b { color: #fff; }
</style>
</head>
<body>
  <div id="nebula"></div>
  <canvas id="starfield"></canvas>

  <div class="tag">
    <b>开源片段：</b> UsmanDevCraft/grok-shooting-stars（GROK 风格，MIT 开源）<br>
    旋转星轨 + 正弦闪烁 + 偶发流星，原生 Canvas 零依赖。<br>
    下方可切「原版纯黑 / 叠加我们的星云图」，拖滑块调星数。
  </div>

  <div class="panel">
    <button id="btnBlack" class="active">原版纯黑</button>
    <button id="btnNebula">叠加星云图</button>
    <label>星数 <span id="cnt">360</span></label>
    <input id="density" type="range" min="120" max="900" value="360">
  </div>

  <script src="starfield.js"></script>
</body>
</html>
