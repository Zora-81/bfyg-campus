<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>程序化星空 demo（无图）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#02030a; }
  #space-canvas { position:fixed; inset:0; z-index:1; }
  #ui {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:10; display:flex; align-items:center; gap:12px;
    background:rgba(16,20,40,0.72); border:1px solid rgba(120,140,255,0.22);
    padding:12px 18px; border-radius:999px; backdrop-filter: blur(14px);
    font-family: system-ui, -apple-system, sans-serif; color:#e8ecff; font-size:13px;
  }
  #ui label { display:flex; align-items:center; gap:8px; cursor:pointer; }
  #ui input[type=range] { width:110px; }
  #ui button {
    background: linear-gradient(135deg, #4a6fff, #8b5cf6);
    border:none; color:#fff; padding:8px 16px; border-radius:999px; cursor:pointer; font-size:13px;
  }
  #ui button:hover { filter:brightness(1.1); }
  #hint {
    position:fixed; top:20px; left:20px; z-index:10; color:#a5b4fc; font-family:system-ui; font-size:13px;
    max-width:360px; line-height:1.6; background:rgba(0,0,0,0.35); padding:12px 14px; border-radius:10px;
  }
</style>
</head>
<body>
<canvas id="space-canvas"></canvas>
<div id="hint">新版：星云更淡、更结构化（带状暗道）；星星光晕收紧、核更实，整体不再均匀模糊。可调下方滑块对比。</div>
<div id="ui">
  <button id="toggle-nebula">星云: 开</button>
  <label>星数:<span id="star-count">700</span><input type="range" id="star-range" min="200" max="1600" value="700"></label>
  <label>星云强度:<span id="nebula-level">5</span><input type="range" id="nebula-range" min="0" max="10" value="5"></label>
</div>
<script src="improved.js"></script>
</body>
</html>
