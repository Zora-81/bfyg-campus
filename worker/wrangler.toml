name = "baofeng-campus-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
account_id = "29628936044d436de9dc14e4a4882362"

# 专用子域名 api.bfgzlt.cc.cd 承载全部 API/WebSocket 代理。
# 用子域名而非根域，避免 InsForge 部署时同步 Cloudflare 区域把路由清空。
# 未配置 account_id 时可用 Cloudflare 控制台「Workers → 新建 → 粘贴 index.js」部署，
# 再在 bfgzlt.cc.cd 的 DNS 页添加 api 子域名（橙色云朵）+ 绑定路由 api.bfgzlt.cc.cd/* 即可。
routes = [
  "api.bfgzlt.cc.cd/*"
]
