<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 — 校园频道</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-brand">
        <div class="admin-brand-name">
          <span class="brand-icon">🎯</span> 校园频道
        </div>
        <div class="admin-brand-ver">管理后台 v1.0</div>
      </div>
      <nav class="admin-nav" id="admin-nav">
        <div class="admin-nav-section">管理</div>
        <button class="admin-nav-item active" data-module="users">
          <span class="nav-icon">👥</span> 用户管理
        </button>
        <button class="admin-nav-item" data-module="posts">
          <span class="nav-icon">📋</span> 帖子审核
          <span class="nav-badge" id="pending-count">0</span>
        </button>
        <button class="admin-nav-item" data-module="dashboard">
          <span class="nav-icon">📊</span> 数据看板
        </button>
      </nav>
      <div class="admin-sidebar-footer">
        <a class="admin-back-link" href="index.html">← 返回频道</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <!-- Header -->
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="admin-mobile-toggle" id="admin-mobile-toggle" aria-label="菜单">☰</button>
          <div>
            <div class="admin-header-title" id="admin-header-title">用户管理</div>
            <div class="admin-header-desc" id="admin-header-desc">管理系统用户与权限</div>
          </div>
        </div>
        <div class="admin-header-right">
          <span style="font-size:var(--text-sm);color:var(--text-dim);">管理员</span>
          <div class="admin-user-avatar" id="admin-avatar">A</div>
        </div>
      </header>

      <!-- ── Module: 用户管理 ── -->
      <section class="admin-module active" id="module-users">
        <div class="admin-toolbar">
          <div class="admin-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="user-search" placeholder="搜索用户名或显示名..." />
          </div>
          <select class="admin-filter" id="user-role-filter">
            <option value="">全部角色</option>
            <option value="admin">管理员</option>
            <option value="moderator">版主</option>
            <option value="member">普通成员</option>
          </select>
          <select class="admin-filter" id="user-status-filter">
            <option value="">全部状态</option>
            <option value="active">正常</option>
            <option value="disabled">已禁用</option>
          </select>
          <button class="btn-primary" id="btn-add-user">+ 添加用户</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="user-table">
            <thead>
              <tr>
                <th style="width:40px;"><input type="checkbox" class="admin-checkbox" id="user-select-all" /></th>
                <th data-sort="displayName">用户</th>
                <th data-sort="username">用户名</th>
                <th data-sort="role">角色</th>
                <th data-sort="status">状态</th>
                <th data-sort="createdAt">注册时间</th>
                <th style="width:140px;">操作</th>
              </tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
        <div class="admin-pagination" id="user-pagination">
          <span class="pagination-info" id="user-pagination-info">共 0 条</span>
          <div class="pagination-btns" id="user-pagination-btns"></div>
        </div>
      </section>

      <!-- ── Module: 帖子审核 ── -->
      <section class="admin-module" id="module-posts">
        <div class="admin-toolbar">
          <div class="admin-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="post-search" placeholder="搜索内容或作者..." />
          </div>
          <select class="admin-filter" id="post-channel-filter">
            <option value="">全部频道</option>
          </select>
          <button class="btn-primary btn-sm" id="btn-batch-approve">标记已审</button>
          <button class="btn-danger btn-sm" id="btn-batch-reject">批量删除</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="post-table">
            <thead>
              <tr>
                <th style="width:40px;"><input type="checkbox" class="admin-checkbox" id="post-select-all" /></th>
                <th style="width:100px;">作者</th>
                <th>内容预览</th>
                <th data-sort="channel_id" style="width:100px;">频道</th>
                <th data-sort="created_at" style="width:90px;">时间</th>
                <th style="width:80px;">类型</th>
                <th style="width:100px;">操作</th>
              </tr>
            </thead>
            <tbody id="post-tbody"></tbody>
          </table>
        </div>
        <div class="admin-pagination" id="post-pagination">
          <span class="pagination-info" id="post-pagination-info">共 0 条</span>
          <div class="pagination-btns" id="post-pagination-btns"></div>
        </div>
      </section>

      <!-- ── Module: 数据看板 ── -->
      <section class="admin-module" id="module-dashboard">
        <div class="stat-cards" id="stat-cards">
          <div class="stat-card">
            <div class="stat-card-header">
              <span class="stat-card-label">总用户数</span>
              <div class="stat-card-icon purple">👥</div>
            </div>
            <div class="stat-card-value" id="stat-total-users">0</div>
            <div class="stat-card-change up">▲ 12% <span style="color:var(--text-muted);margin-left:4px;">较上周</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-header">
              <span class="stat-card-label">今日消息</span>
              <div class="stat-card-icon green">💬</div>
            </div>
            <div class="stat-card-value" id="stat-today-msgs">0</div>
            <div class="stat-card-change up">▲ 8% <span style="color:var(--text-muted);margin-left:4px;">较昨日</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-header">
              <span class="stat-card-label">活跃频道</span>
              <div class="stat-card-icon blue">📡</div>
            </div>
            <div class="stat-card-value" id="stat-active-channels">0</div>
            <div class="stat-card-change down">▼ 3% <span style="color:var(--text-muted);margin-left:4px;">较上周</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-header">
              <span class="stat-card-label">待审核帖子</span>
              <div class="stat-card-icon orange">📋</div>
            </div>
            <div class="stat-card-value" id="stat-pending-posts">0</div>
            <div class="stat-card-change up">▲ 15% <span style="color:var(--text-muted);margin-left:4px;">较昨日</span></div>
          </div>
        </div>

        <div class="chart-section">
          <div class="chart-card">
            <h4>📈 近7日消息趋势</h4>
            <div class="chart-placeholder" id="chart-messages"></div>
          </div>
          <div class="chart-card">
            <h4>📋 最近活动</h4>
            <div class="activity-list" id="activity-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ── Modal: 添加/编辑用户 ── -->
  <div class="admin-modal-overlay" id="user-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 class="admin-modal-title" id="user-modal-title">添加用户</h3>
        <button class="admin-modal-close" id="user-modal-close">✕</button>
      </div>
      <div class="admin-modal-body">
        <div class="admin-form-group">
          <label class="admin-form-label">用户名</label>
          <input type="text" class="admin-form-input" id="form-username" placeholder="登录账号" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">显示名称</label>
          <input type="text" class="admin-form-input" id="form-displayname" placeholder="对外显示的名称" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">密码</label>
          <input type="password" class="admin-form-input" id="form-password" placeholder="设置初始密码" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">角色</label>
          <select class="admin-form-select" id="form-role">
            <option value="member">普通成员</option>
            <option value="moderator">版主</option>
            <option value="admin">管理员</option>
          </select>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-ghost" id="user-modal-cancel">取消</button>
        <button class="btn-primary" id="user-modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: 确认删除 ── -->
  <div class="admin-modal-overlay" id="confirm-modal-overlay">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 class="admin-modal-title">确认操作</h3>
        <button class="admin-modal-close" id="confirm-modal-close">✕</button>
      </div>
      <div class="admin-modal-body">
        <p id="confirm-modal-msg" style="font-size:var(--text-sm);color:var(--text-sec);line-height:1.6;">确认执行此操作？</p>
      </div>
      <div class="admin-modal-footer">
        <button class="btn-ghost" id="confirm-modal-cancel">取消</button>
        <button class="btn-danger" id="confirm-modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../js/admin.js"></script>
</body>
</html>
