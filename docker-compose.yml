version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/app/html:ro
      - ./css:/app/css:ro
      - ./js:/app/js:ro
      - ./images:/app/images:ro
    depends_on:
      - server

  server:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      # 持久化目录：数据库与上传文件都落在 /app/data 下
      - PERSIST_DIR=/app/data
      # 密钥从 .env 读取，未配置时回退为占位符（部署前务必覆盖）
      - JWT_SECRET=${JWT_SECRET:-change-me-in-env}
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      # 仅挂载持久化子目录，切勿挂载到 /app，否则会覆盖镜像内的应用代码
      - server-data:/app/data

volumes:
  server-data:
