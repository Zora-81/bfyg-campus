name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: node _build.mjs
      - name: Verify build output
        run: |
          test -f web_build/index.html && echo "build OK" || (echo "build failed" && exit 1)
